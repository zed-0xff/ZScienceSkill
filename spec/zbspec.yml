---
# ZBSpec configuration for ZScienceSkill

sandbox: false

helpers:
  - common_helpers

ready_condition: |
  local player = getPlayer() or (getOnlinePlayers():size() > 0 and getOnlinePlayers():get(0))
  return player and not player:tooDarkToRead()

# Your mod(s) to spec (ZombieBuddy and ZBSpec are automatically included)
mods:
  - { id: ZScienceSkill, path: "." }
  - ZBBetterFPS

game_versions:
  - 42.15
  - unstable
